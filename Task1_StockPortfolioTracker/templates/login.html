<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            width:350px;
            text-align:center;
            color:white;
        }

        h2{
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            cursor:pointer;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        p{
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
