<!DOCTYPE html>
<html>

<head>

    <title>Hangman Game</title>

    <style>

        body{
            background:#1b1f24;
            color:white;
            font-family:Arial, sans-serif;
            margin:0;
            padding:0;
        }

        .main-container{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:100px;
            margin-top:40px;
            padding:30px;
        }

        .left-section{
            width:55%;
            text-align:center;
        }

        .right-section{
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        h1{
            font-size:50px;
            color:cyan;
            text-shadow:0 0 15px cyan;
        }

        .hint{
            color:#ffd166;
            font-size:24px;
            margin-top:10px;
        }

        .word-container{
            display:flex;
            justify-content:center;
            gap:12px;
            margin:30px;
            flex-wrap:wrap;
        }

        .letter-box{
            width:60px;
            height:60px;
            border-radius:15px;
            border:2px solid cyan;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:35px;
            font-weight:bold;
            background:#2b3138;
            color:yellow;
            box-shadow:0 0 10px cyan;
        }

        .guessed{
            margin-top:20px;
            font-size:22px;
        }

        .message{
            font-size:25px;
            margin-top:20px;
            color:#00ffcc;
        }

        input{
            width:240px;
            padding:15px;
            border:none;
            outline:none;
            border-radius:30px;
            font-size:18px;
            text-align:center;
            background:#2b3138;
            color:white;
            box-shadow:0 0 12px cyan;
            margin-top:20px;
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:30px;
            background:cyan;
            color:black;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            margin-top:20px;
            transition:0.3s;
            box-shadow:0 0 15px cyan;
        }

        button:hover{
            transform:scale(1.08);
        }

        .restart-btn{
            display:inline-block;
            margin-top:30px;
            padding:15px 35px;
            background:linear-gradient(45deg,#ff416c,#ff4b2b);
            color:white;
            font-size:20px;
            font-weight:bold;
            border-radius:40px;
            text-decoration:none;
            box-shadow:0 0 20px rgba(255,75,43,0.7);
            transition:0.3s;
        }

        .restart-btn:hover{
            transform:scale(1.08);
        }

        .hangman-art{
            font-size:28px;
            color:#ff4d4d;
            background:#2b3138;
            padding:20px;
            border-radius:20px;
            box-shadow:0 0 15px rgba(255,0,0,0.5);
        }

        .score{
            margin-top:20px;
            color:#00ffcc;
            font-size:28px;
        }

    </style>

</head>

<body>

    <div class="main-container">

        <!-- LEFT -->

        <div class="left-section">

            <h1>Hangman Game 👾🎮</h1>

            <h3 class="hint">
                💡 Hint: {{ hint }}
            </h3>

            <div class="word-container">

                {% for letter in display.split() %}

                    <div class="letter-box">
                        {{ letter }}
                    </div>

                {% endfor %}

            </div>

            <div class="guessed">
                📝 Guessed Letters: {{ guessed }}
            </div>

            <div class="message">
                {{ message }}
            </div>

            {% if chances > 0 and "_" in display %}

            <form method="POST">

                <input
                    type="text"
                    name="guess"
                    maxlength="1"
                    placeholder="Enter a letter"
                    required
                >

                <br>

                <button type="submit">
                    Guess
                </button>

            </form>

            {% endif %}

            <a href="/reset" class="restart-btn">
                🔄 Restart Game
            </a>

        </div>

        <!-- RIGHT -->

        <div class="right-section">

            <pre class="hangman-art">
{{ hangman }}
            </pre>

            <h2 class="score">
                ❤️ Chances Left: {{ chances }}
            </h2>

        </div>

    </div>

</body>

</html>
